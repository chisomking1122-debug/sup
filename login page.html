<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="loginbox">

        <h1>Login</h1>

        <div class="input">
            <input type="Email" name="Email" id="Email" placeholder="Email" ><br>
            <input type="Password" name="Password" id="password" placeholder="Password">
            
            <div class="Forgot">
                <a href="https://www.website.com/forgot-password/?source=SC">Forgot Password?</a>
            </div>

            <div class="login">
                <a href="@">Login</a>
            </div>

            <div class="signup">
            Don't have an account? <a href="http://127.0.0.1:5500/login%20page%202.html">Sign up</a>
            </div>

            <div class="or">
            --------------Or---------------
            </div>
            <div class="facebook">
            <i class="fa-brands fa-facebook" style="color: rgb(255, 255, 255);"></i>
            <a href="https://web.facebook.com/login/?_rdc=1&_rdr#">Login with Facebook </a>
            </div>

             <div class="Google">
            <img src="google.png" alt="">
            <a href="https://accounts.google.com/v3/signin/identifier?authuser=0&continue=https%3A%2F%2Fmyaccount.google.com%2F%3Futm_source%3Dsign_in_no_continue%26pli%3D1&ec=GAlAwAE&hl=en&flowName=GlifWebSignIn&flowEntry=AddSession&dsh=S436272582%3A1783342362654519">Login with Google</a>
            </div>
            
        </div>
    </div>
</body>
</html>
